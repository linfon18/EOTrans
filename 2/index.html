<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOTrans - Base64 文件传输</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-tab {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 16px;
        }

        .mode-tab.active {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }

        .mode-tab:hover {
            border-color: #667eea;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .file-input-wrapper {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .file-input-wrapper:hover {
            border-color: #667eea;
            background: #f9f9ff;
        }

        .file-input-wrapper.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .output-area {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .hidden {
            display: none !important;
        }

        .copy-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .size-warning {
            color: #ff9800;
            font-size: 14px;
            margin-top: 10px;
        }

        .file-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .file-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← 返回主版本</a>
        <h1>📦 EOTrans Base64 版</h1>
        <p class="subtitle">将文件转换为 Base64 字符串传输，适合小文件</p>

        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('encode')">📤 文件转字符串</button>
            <button class="mode-tab" onclick="switchMode('decode')">📥 字符串转文件</button>
        </div>

        <!-- 文件转字符串 -->
        <div id="encodeSection" class="section active">
            <div class="file-input-wrapper" id="dropZone">
                <p>📁 点击选择文件或拖拽到此处</p>
                <p class="size-warning">⚠️ 建议文件小于 5MB，大文件请使用主版本</p>
                <input type="file" id="fileInput" multiple>
            </div>

            <div id="encodeFileList" class="file-list hidden"></div>

            <div id="encodeProgress" class="hidden">
                <div class="progress-bar">
                    <div class="progress-fill" id="encodeProgressBar" style="width: 0%"></div>
                </div>
                <div class="status info" id="encodeStatus">正在转换...</div>
            </div>

            <div id="encodeOutput" class="hidden">
                <h3>📋 Base64 字符串（点击复制）：</h3>
                <textarea class="output-area" id="base64Output" readonly></textarea>
                <p class="copy-hint">💡 提示：点击文本框即可自动复制</p>
                <button class="btn btn-primary" onclick="copyToClipboard()">📋 复制到剪贴板</button>
                <button class="btn btn-secondary" onclick="downloadAsText()">💾 下载为文本文件</button>
            </div>
        </div>

        <!-- 字符串转文件 -->
        <div id="decodeSection" class="section">
            <h3>📋 粘贴 Base64 字符串：</h3>
            <textarea class="output-area" id="base64Input" placeholder="在此处粘贴 Base64 字符串..."></textarea>
            
            <div id="decodeFileInfo" class="file-info hidden">
                <p><strong>文件名：</strong><span id="decodeFileName">-</span></p>
                <p><strong>文件大小：</strong><span id="decodeFileSize">-</span></p>
                <p><strong>文件类型：</strong><span id="decodeFileType">-</span></p>
            </div>

            <button class="btn btn-primary" onclick="decodeFile()">🔓 解码并下载</button>
            <button class="btn btn-secondary" onclick="clearDecode()">🗑️ 清空</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
